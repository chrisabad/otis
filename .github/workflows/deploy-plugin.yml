name: Deploy kaleidoscope-issue-trigger

on:
  push:
    branches: [main]
    paths:
      - "plugins/kaleidoscope-issue-trigger/src/**"
      - "plugins/kaleidoscope-issue-trigger/routing-rules.json"
      - "plugins/kaleidoscope-issue-trigger/paperclip.manifest.json"
      - "plugins/kaleidoscope-issue-trigger/package.json"
      - "plugins/kaleidoscope-issue-trigger/esbuild.config.mjs"
      - "plugins/kaleidoscope-issue-trigger/package-lock.json"
      - "agents/**"
      - ".github/workflows/deploy-plugin.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, skip deploy)"
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/kaleidoscope-issue-trigger

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: plugins/kaleidoscope-issue-trigger/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Connect to Tailnet
        if: ${{ !inputs.dry_run }}
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Deploy to VPS
        if: ${{ !inputs.dry_run }}
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: 100.117.92.5
          VPS_USER: root
          VPS_PATH: /docker/paperclip-ezk7/data/plugins/kaleidoscope-issue-trigger/dist/worker.js
        run: |
          echo "$VPS_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          scp -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            dist/worker.js \
            "${VPS_USER}@${VPS_HOST}:${VPS_PATH}"

          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            "${VPS_USER}@${VPS_HOST}" \
            "touch ${VPS_PATH} && echo 'Plugin reloaded'"

          # Deploy agent instruction bundles
          for agent in juno axel orion ellis quinn vera dex; do
            DEST="/docker/paperclip-ezk7/data/agent-instructions/${agent}/AGENTS.md"
            ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no "${VPS_USER}@${VPS_HOST}" \
              "mkdir -p /docker/paperclip-ezk7/data/agent-instructions/${agent}"
            scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
              "$GITHUB_WORKSPACE/agents/${agent}/AGENTS.md" \
              "${VPS_USER}@${VPS_HOST}:${DEST}"
            echo "Deployed instructions for ${agent}"
          done

          rm /tmp/deploy_key

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "Dry run complete. Built artifact:"
          ls -lh dist/worker.js
          echo "Would deploy to: ${VPS_USER}@${VPS_HOST}:${VPS_PATH}"
        env:
          VPS_HOST: 100.117.92.5
          VPS_USER: root
          VPS_PATH: /docker/paperclip-ezk7/data/plugins/kaleidoscope-issue-trigger/dist/worker.js
